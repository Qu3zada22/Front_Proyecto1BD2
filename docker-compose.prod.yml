# ============================================================
# FastPochi — Stack completo para PRODUCCIÓN (MongoDB Atlas)
# Uso: docker compose -f docker-compose.prod.yml up -d --build
# Requiere: .env.prod con MONGODB_URI=mongodb+srv://...
# ============================================================

services:
  # ── API NestJS ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fastpochi-api-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - internal
    # No exponer 3000 al exterior — nginx es el único punto de entrada

  # ── Frontend nginx ────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: /api # URLs relativas → nginx proxy
    container_name: fastpochi-client-prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge
