server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA routing — React Router maneja las rutas en el cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend NestJS (mismo docker network)
    location /api {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Permitir uploads de imágenes hasta 15 MB
        client_max_body_size 15m;
    }

    # Swagger UI en producción (si se expone)
    location /docs {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }

    # Cache agresivo para assets con hash en el nombre
    # Se excluye /api para que las imágenes de GridFS no se intercepten aquí
    location ~* ^(?!/api).+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
