# ============================================================
# FastPochi - Docker Compose (desarrollo local)
# MongoDB con replica set de 1 nodo (requerido para transacciones)
# ============================================================
#
# Uso:
#   docker compose up -d          → levantar servicios
#   docker compose down           → bajar servicios
#   docker compose down -v        → bajar y borrar datos
#   docker compose logs -f mongo  → ver logs de mongo
#
# Conexión:
#   URI: mongodb://localhost:27017/fastpochi?replicaSet=rs0
#
# GUI (mongo-express):
#   http://localhost:8081

services:
  mongo:
    image: mongo:8.2.5
    container_name: fastpochi-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # Inicia con replica set + notablescan (rechaza queries sin índice, según diseño)
    command: ["--replSet", "rs0", "--bind_ip_all", "--setParameter", "notablescan=1"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Inicializa el replica set una sola vez al arrancar
  mongo-init:
    image: mongo:8.2.5
    container_name: fastpochi-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command: >
      mongosh --host mongo:27017 --quiet --eval
      "try { rs.status(); print('replica set ya inicializado') }
       catch(e) {
         rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
         print('replica set inicializado OK')
       }"

  # GUI para explorar la base de datos en el navegador
  mongo-express:
    image: mongo-express:1.0.2
    container_name: fastpochi-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
